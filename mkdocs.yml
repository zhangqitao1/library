site_name: 小雨的学习知识库
site_description: 初中七年级各科教材知识卡片、思维导图、易错点与在线自测卷
docs_dir: subjects
site_dir: _site
use_directory_urls: true

theme:
  name: material
  language: zh
  features:
    - navigation.tracking
    - navigation.top
    - navigation.indexes
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue
      accent: blue
      toggle:
        icon: material/weather-night
        name: 切换到夜间模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue
      accent: blue
      toggle:
        icon: material/weather-sunny
        name: 切换到日间模式

plugins:
  # 中文分词搜索：jieba 已装时 Material 自动启用，separator 兜底切分标点
  - search:
      separator: '[\s\u200b\-,，。、；：！？（）()]+'
  - awesome-pages:
      collapse_single_pages: true

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.arithmatex:
      generic: true

extra_javascript:
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js
