<!DOCTYPE html>
<!--
  自测卷模板（自包含，无需联网，可直接打印）
  生成试卷时：复制本文件 → 替换 {{占位}} → 填入题目与答案 → 存到 subjects/<科目>/试卷/自测卷/
  设计：默认隐藏答案与解析（点"显示答案"展开），方便先做后对。
-->
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{科目}}自测卷 · {{范围}}</title>
<style>
  :root { --ink:#1f2937; --line:#d1d5db; --soft:#6b7280; --brand:#2563eb; }
  * { box-sizing: border-box; }
  body { font-family: "PingFang SC","Microsoft YaHei",system-ui,sans-serif;
         color: var(--ink); max-width: 820px; margin: 24px auto; padding: 0 20px; line-height: 1.8; }
  header { border-bottom: 2px solid var(--ink); padding-bottom: 12px; margin-bottom: 8px; }
  h1 { font-size: 22px; margin: 0 0 6px; }
  .meta { color: var(--soft); font-size: 14px; display: flex; gap: 20px; flex-wrap: wrap; }
  .fill { border-bottom: 1px solid var(--ink); display: inline-block; min-width: 120px; }
  .tip { background:#eff6ff; border-left:4px solid var(--brand); padding:8px 12px; font-size:14px; color:#1e40af; margin:14px 0; border-radius:4px; }
  .section { font-weight: 700; font-size: 17px; margin: 22px 0 10px; color: var(--brand); }
  .q { margin: 16px 0; padding-left: 4px; }
  .q .stem { font-weight: 500; }
  .q .kp { font-size: 12px; color: var(--soft); margin-left: 6px; }
  .options { margin: 6px 0 0 16px; }
  .options div { margin: 3px 0; }
  .answerline { border-bottom: 1px solid var(--line); height: 28px; margin-top: 8px; }
  details { margin-top: 8px; background:#f9fafb; border:1px solid var(--line); border-radius:6px; padding:6px 12px; }
  summary { cursor: pointer; color: var(--brand); font-size: 14px; font-weight:600; }
  .ans { color:#047857; font-weight:600; }
  .sol { color: var(--ink); font-size: 14px; margin-top:4px; }
  .toolbar { text-align:right; margin: 10px 0; }
  button { background: var(--brand); color:#fff; border:0; padding:6px 14px; border-radius:6px; cursor:pointer; font-size:14px; }
  @media print {
    .toolbar { display:none; }
    details { border:none; background:none; }
    details summary { display:none; }
    details[open] .ans, details[open] .sol { display:block; }
    details:not([open]) { display:none; }   /* 打印空白卷时不展开答案 */
  }
</style>
</head>
<body>
<header>
  <h1>{{科目}}自测卷 · {{范围}}</h1>
  <div class="meta">
    <span>姓名：<span class="fill">小雨</span></span>
    <span>日期：<span class="fill">{{日期}}</span></span>
    <span>用时：<span class="fill"></span>分钟</span>
    <span>得分：<span class="fill"></span></span>
  </div>
</header>

<div class="tip">本卷针对薄弱点定制：{{薄弱点说明}}。先独立做完，再点每题"显示答案"对照。</div>

<div class="toolbar">
  <button onclick="document.querySelectorAll('details').forEach(d=>d.open=true)">显示全部答案</button>
  <button onclick="document.querySelectorAll('details').forEach(d=>d.open=false)">隐藏全部答案</button>
</div>

<!-- ================= 一、选择题 ================= -->
<div class="section">一、选择题</div>

<div class="q">
  <span class="stem">1. {{题干}}<span class="kp">[考点：{{知识点}}]</span></span>
  <div class="options">
    <div>A. {{选项}}</div>
    <div>B. {{选项}}</div>
    <div>C. {{选项}}</div>
    <div>D. {{选项}}</div>
  </div>
  <details>
    <summary>显示答案与解析</summary>
    <div class="ans">答案：{{答案}}</div>
    <div class="sol">解析：{{解析}}</div>
  </details>
</div>

<!-- ================= 二、填空 / 简答题 ================= -->
<div class="section">二、填空 / 简答题</div>

<div class="q">
  <span class="stem">2. {{题干}}<span class="kp">[考点：{{知识点}}]</span></span>
  <div class="answerline"></div>
  <details>
    <summary>显示答案与解析</summary>
    <div class="ans">答案：{{答案}}</div>
    <div class="sol">解析：{{解析}}</div>
  </details>
</div>

</body>
</html>
